<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Học từ vựng cùng Ms. Thúy</title>
  <style>
    /* GIỮ NGUYÊN TOÀN BỘ CSS TỪ FILE LAYOUT CỦA BẠN */
    :root { --bg-primary: #f4f6fb; --bg-card: #ffffff; --gradient-start: #a8d8ea; --gradient-mid: #aa96da; --gradient-end: #fcbad3; --text-primary: #2d3436; --text-secondary: #636e72; --text-light: #b2bec3; --accent-blue: #74b9ff; --accent-purple: #a29bfe; --accent-pink: #fd79a8; --success: #00b894; --error: #e17055; --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06); --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08); --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12); --radius-md: 16px; --radius-lg: 24px; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-main); background: linear-gradient(135deg, var(--bg-primary) 0%, #e8ecf4 100%); min-height: 100vh; color: var(--text-primary); }
    .bg-decoration { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25; animation: float 20s ease-in-out infinite; }
    .blob-1 { width: 400px; height: 400px; background: var(--gradient-start); top: -100px; right: -100px; }
    .blob-2 { width: 350px; height: 350px; background: var(--gradient-mid); bottom: -80px; left: -80px; }
    @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,20px)} }
    .app-container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 40px 20px 30px; }
    .header__logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .page { display: none; animation: fadeSlideIn 0.5s ease-out; }
    .page--active { display: block; }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .vocab-table-wrapper { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; }
    .table-scroll { overflow-x: auto; max-height: 500px; }
    .vocab-table { width: 100%; border-collapse: collapse; }
    .vocab-table th { padding: 14px; background: var(--accent-purple); color: white; text-align: left; }
    .vocab-table td { padding: 12px; border-bottom: 1px solid #f1f2f6; }
    .btn-cta { padding: 16px 40px; border: none; border-radius: var(--radius-md); background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; font-weight: 700; cursor: pointer; margin-top: 20px; }
    .quiz-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 30px; box-shadow: var(--shadow-lg); text-align: center; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .quiz-option { padding: 15px; border: 2px solid #eee; border-radius: var(--radius-md); background: white; cursor: pointer; font-weight: 700; }
    .quiz-option--correct { border-color: var(--success); background: rgba(0,184,148,0.1); }
    .quiz-option--wrong { border-color: var(--error); background: rgba(225,112,85,0.1); }
    .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; }
    .progress-bar__fill { height: 100%; background: var(--accent-blue); width: 0%; transition: 0.3s; }
  </style>
</head>
<body>
  <div class="bg-decoration"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  
  <div class="app-container">
    <header class="header">
      <h1 class="header__logo" id="dynamic-title">Đang tải bài học...</h1>
    </header>

    <section id="page-dashboard" class="page page--active">
      <div class="vocab-table-wrapper">
        <div class="table-scroll">
          <table class="vocab-table">
            <thead><tr><th>Từ vựng</th><th>Nghĩa</th><th>🔊</th></tr></thead>
            <tbody id="vocabBody"></tbody>
          </table>
        </div>
      </div>
      <div style="text-align:center"><button class="btn-cta" id="btnStartQuiz">🚀 Bắt đầu Quiz</button></div>
    </section>

    <section id="page-quiz" class="page">
      <div class="progress-bar"><div class="progress-bar__fill" id="progressFill"></div></div>
      <div class="quiz-card" id="quizCard"></div>
    </section>

    <section id="page-results" class="page" id="resultsContent"></section>
  </div>

  <script>
    let VOCAB_DATA = [];
    let State = { quizQuestions: [], currentQuestionIndex: 0, score: 0, hasAnswered: false };

    // 1. HÀM QUAN TRỌNG: Lấy dữ liệu từ thư mục data/
    async function initApp() {
      const params = new URLSearchParams(window.location.search);
      const lessonName = params.get('lesson'); // Lấy tên file từ URL (?lesson=ten-file)

      if (!lessonName) {
        document.getElementById('dynamic-title').innerText = "Vui lòng chọn bài học";
        return;
      }

      try {
        const response = await fetch(`data/${lessonName}.json`);
        if (!response.ok) throw new Error();
        VOCAB_DATA = await response.json();
        
        // Cập nhật tiêu đề dựa trên tên file (thay thế dấu gạch ngang bằng khoảng trắng)
        document.getElementById('dynamic-title').innerText = lessonName.replace(/-/g, ' ').toUpperCase();
        renderDashboard();
      } catch (err) {
        document.getElementById('dynamic-title').innerText = "Lỗi: Không tìm thấy file dữ liệu!";
      }
    }

    function renderDashboard() {
      const tbody = document.getElementById('vocabBody');
      tbody.innerHTML = VOCAB_DATA.map(item => `
        <tr>
          <td style="font-weight:700">${item.word}</td>
          <td>${item.meaning}</td>
          <td><button onclick="speak('${item.word}')">🔊</button></td>
        </tr>`).join('');
    }

    function speak(word) {
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }

    function startQuiz() {
      State.quizQuestions = [...VOCAB_DATA].sort(() => Math.random() - 0.5);
      State.currentQuestionIndex = 0;
      State.score = 0;
      navigateTo('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q = State.quizQuestions[State.currentQuestionIndex];
      const options = [...VOCAB_DATA].sort(() => Math.random() - 0.5).slice(0, 3).map(v => v.word);
      if (!options.includes(q.word)) options[0] = q.word;
      const finalOptions = options.sort(() => Math.random() - 0.5);

      document.getElementById('progressFill').style.width = `${(State.currentQuestionIndex / State.quizQuestions.length) * 100}%`;
      
      document.getElementById('quizCard').innerHTML = `
        <h2>${q.sentence.replace('________', '____')}</h2>
        <p style="margin: 10px 0; color: #666;">(Nghĩa: ${q.meaning})</p>
        <div class="quiz-options">
          ${finalOptions.map(opt => `<button class="quiz-option" onclick="handleAnswer(this, '${opt}', '${q.word}')">${opt}</button>`).join('')}
        </div>
      `;
      State.hasAnswered = false;
    }

    function handleAnswer(btn, selected, correct) {
      if (State.hasAnswered) return;
      State.hasAnswered = true;
      
      const isCorrect = selected === correct;
      btn.classList.add(isCorrect ? 'quiz-option--correct' : 'quiz-option--wrong');
      if (isCorrect) State.score++;

      // CHỈNH ĐÚNG 2 GIÂY RỒI CHUYỂN CÂU
      setTimeout(() => {
        State.currentQuestionIndex++;
        if (State.currentQuestionIndex < State.quizQuestions.length) renderQuestion();
        else showResults();
      }, 1000);
    }

    function showResults() {
      navigateTo('results');
      document.getElementById('page-results').innerHTML = `
        <div class="quiz-card">
          <h1>Kết quả: ${State.score}/${State.quizQuestions.length}</h1>
          <button class="btn-cta" onclick="location.reload()">Làm lại</button>
        </div>
      `;
    }

    function navigateTo(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('page--active'));
      document.getElementById(`page-${id}`).classList.add('page--active');
    }

    document.getElementById('btnStartQuiz').onclick = startQuiz;
    window.onload = initApp;
  </script>
</body>
</html>
