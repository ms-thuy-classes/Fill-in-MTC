<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Học từ vựng cùng Ms. Thúy | Trang chủ</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;800&display=swap">
  <style>
    :root {
      --bg: #f4f6fb; --card: #fff; --text: #2d3436; --text-sec: #636e72;
      --blue: #74b9ff; --purple: #a29bfe; --pink: #fd79a8;
      --grad: linear-gradient(135deg, var(--blue), var(--purple), var(--pink));
      --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px;
      --trans: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
    .container{max-width:900px;margin:0 auto;padding:40px 20px}
    header{text-align:center;margin-bottom:40px}
    h1{font-size:2.2rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:var(--text-sec);margin-top:8px}
    
    .search-box{position:relative;max-width:500px;margin:0 auto 40px}
    .search-box input{width:100%;padding:14px 20px;border:2px solid transparent;border-radius:var(--radius);background:var(--card);font-size:1rem;box-shadow:var(--shadow);transition:var(--trans);outline:none}
    .search-box input:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(162,155,254,0.15)}
    
    .article-list{display:grid;gap:20px}
    .article-card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:var(--trans);display:flex;flex-direction:column;gap:12px;border:1px solid #f1f2f6}
    .article-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,0.12)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
    .card-title{font-size:1.3rem;font-weight:700;color:var(--text)}
    .card-date{background:#f1f2f6;padding:4px 10px;border-radius:20px;font-size:0.8rem;color:var(--text-sec);font-weight:600}
    .card-desc{color:var(--text-sec);font-size:0.95rem}
    .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;flex-wrap:wrap;gap:10px}
    .tags{display:flex;gap:8px}
    .tag{font-size:0.75rem;padding:3px 10px;border-radius:12px;background:rgba(162,155,254,0.1);color:var(--purple);font-weight:600}
    .btn{padding:10px 20px;border:none;border-radius:12px;background:var(--grad);color:white;font-weight:700;cursor:pointer;transition:var(--trans);text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(162,155,254,0.3)}
    .btn-outline{background:transparent;border:2px solid var(--purple);color:var(--purple)}
    .btn-outline:hover{background:var(--purple);color:white}
    .data-link{font-size:0.85rem;color:var(--text-sec);text-decoration:underline;cursor:pointer}
    .data-link:hover{color:var(--purple)}
    .empty{text-align:center;padding:40px;color:var(--text-sec)}
    @media(max-width:600px){.article-card{padding:18px}.card-title{font-size:1.1rem}}
    /* Tạo khoảng cách phía trên cho trang quiz */
#page-quiz {
  padding-top: 20px;
}

/* Riêng trên mobile, tăng thêm chút nữa */
@media (max-width: 768px) {
  #page-quiz {
    padding-top: 30px;
  }
  .quiz-header {
    margin-top: 8px;
  }
}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 Học từ vựng cùng Ms. Thúy</h1>
      <p class="subtitle">Kho bài tập từ vựng Tiếng Anh lớp 9 – Trình độ B1</p>
    </header>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm bài viết, chủ đề, từ khóa...">
    </div>

    <div id="articleList" class="article-list">
      <div class="empty">Đang tải danh sách bài học...</div>
    </div>
  </div>

  <script>
    const DOM = {
      list: document.getElementById('articleList'),
      search: document.getElementById('searchInput')
    };

    async function init() {
      try {
        const res = await fetch('data/articles.json');
        if (!res.ok) throw new Error('Không tải được data/articles.json');
        let articles = await res.json();
        articles.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderArticles(articles);
        
        DOM.search.addEventListener('input', e => {
          const q = e.target.value.toLowerCase();
          const filtered = articles.filter(a => 
            a.title.toLowerCase().includes(q) || 
            a.description.toLowerCase().includes(q) ||
            a.tags.some(t => t.toLowerCase().includes(q))
          );
          renderArticles(filtered);
        });
      } catch (err) {
        DOM.list.innerHTML = `<div class="empty">⚠️ Lỗi tải dữ liệu: ${err.message}<br>Hãy đảm bảo bạn đang chạy trên web server (không mở trực tiếp file .html).</div>`;
      }
    }

    function renderArticles(data) {
      if (data.length === 0) {
        DOM.list.innerHTML = `<div class="empty">Không tìm thấy bài viết nào phù hợp 😕</div>`;
        return;
      }
      DOM.list.innerHTML = data.map(a => `
        <div class="article-card">
          <div class="card-header">
            <div class="card-title">${escapeHtml(a.title)}</div>
            <div class="card-date">${formatDate(a.date)}</div>
          </div>
          <div class="card-desc">${escapeHtml(a.description)}</div>
          <div class="tags">${a.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
          <div class="card-footer">
            <a href="lesson.html?id=${a.id}" class="btn">🚀 Bắt đầu học</a>
            <span class="data-link" onclick="alert('Dữ liệu bài viết: data/${a.dataFile}')">📄 Xem dữ liệu bài viết</span>
          </div>
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit', year:'numeric'});
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
