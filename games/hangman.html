<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hangman Vocabulary | Dark Classroom</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            background: radial-gradient(circle at 10% 20%, #0c0b16, #03010a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            color: #f3eefc;
        }

        /* main container */
        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: rgba(12, 10, 22, 0.65);
            backdrop-filter: blur(3px);
            border-radius: 3rem;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(99, 102, 241, 0.1);
            overflow: hidden;
            transition: all 0.3s;
        }

        /* screens */
        .screen {
            padding: 30px 35px;
            transition: opacity 0.4s ease;
        }
        .hidden {
            display: none;
        }

        /* start screen */
        .start-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 2rem;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #8b5cf6;
            padding: 2.5rem;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        }
        h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #e0e7ff, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 8px #a855f7;
        }
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .mode-btn {
            background: #1e1b2e;
            border: 1px solid #4c1d95;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #cbd5e1;
        }
        .mode-btn.active {
            background: #7c3aed;
            color: white;
            box-shadow: 0 0 15px #7c3aed;
            border-color: #c084fc;
        }
        .name-field {
            background: #0f0c1c;
            border: 1px solid #6366f1;
            padding: 14px 20px;
            width: 100%;
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }
        .name-field:focus {
            border-color: #c084fc;
            box-shadow: 0 0 8px #a855f7;
        }
        .start-btn {
            background: linear-gradient(90deg, #4f46e5, #8b5cf6);
            border: none;
            padding: 14px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }
        .start-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px #8b5cf6;
        }

        /* header game */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: #0a0718cc;
            padding: 15px 25px;
            border-radius: 2rem;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .turn-indicator {
            background: #1e1a3a;
            padding: 8px 18px;
            border-radius: 3rem;
            font-weight: bold;
            border-left: 4px solid #f97316;
        }
        .progress-area {
            flex: 1;
            min-width: 180px;
        }
        .progress-bar {
            background: #2d2a44;
            height: 12px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.3s;
        }
        .badge {
            background: #312e5f;
            padding: 6px 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* 2 PLAYER LAYOUT */
        .dual-hangman {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 35px;
        }
        .player-card {
            flex: 1;
            min-width: 260px;
            background: #0b0820aa;
            border-radius: 2rem;
            padding: 18px;
            backdrop-filter: blur(4px);
            border: 1px solid #4f46e5;
            transition: 0.2s;
        }
        .player-card.active-turn {
            border: 2px solid #facc15;
            box-shadow: 0 0 20px #facc15;
            background: #130e28cc;
        }
        .player-name {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .lives {
            text-align: center;
            font-family: monospace;
            font-size: 1.3rem;
            letter-spacing: 4px;
        }
        .hangman-figure {
            position: relative;
            width: 180px;
            height: 190px;
            margin: 15px auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }

        /* gallows base always visible */
        .gallows {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .pole {
            position: absolute;
            background: #5c4e2c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .vertical-pole {
            width: 12px;
            height: 130px;
            bottom: 0;
            left: 30px;
            background: #6b5a3e;
        }
        .horizontal-beam {
            width: 80px;
            height: 10px;
            top: 20px;
            left: 30px;
            background: #6b5a3e;
        }
        .noose-rope {
            width: 3px;
            height: 24px;
            background: #ac9f72;
            position: absolute;
            top: 28px;
            left: 100px;
        }
        /* HANGMAN PARTS (initially hidden) */
        .part {
            position: absolute;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .head {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #efe3c9;
            top: 48px;
            left: 87px;
            box-shadow: 0 0 0 2px #2b241a;
        }
        .body {
            width: 8px;
            height: 45px;
            background: #efe3c9;
            top: 78px;
            left: 97px;
        }
        .left-arm {
            width: 32px;
            height: 8px;
            background: #efe3c9;
            top: 88px;
            left: 70px;
            transform: rotate(25deg);
        }
        .right-arm {
            width: 32px;
            height: 8px;
            background: #efe3c9;
            top: 88px;
            left: 100px;
            transform: rotate(-25deg);
        }
        .left-leg {
            width: 32px;
            height: 8px;
            background: #efe3c9;
            top: 125px;
            left: 70px;
            transform: rotate(35deg);
        }
        .right-leg {
            width: 32px;
            height: 8px;
            background: #efe3c9;
            top: 125px;
            left: 100px;
            transform: rotate(-35deg);
        }

        /* Question area */
        .quiz-area {
            background: #03010fe0;
            border-radius: 2rem;
            padding: 25px;
            margin-top: 10px;
            border: 1px solid #4338ca;
        }
        .sentence {
            font-size: 1.5rem;
            text-align: center;
            font-weight: 500;
            margin-bottom: 25px;
            background: #1e1a34;
            padding: 18px;
            border-radius: 1.5rem;
        }
        .word-blanks {
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 12px;
            font-family: monospace;
            font-weight: bold;
            background: #00000055;
            padding: 12px;
            border-radius: 1rem;
        }
        .guess-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }
        .letter-input {
            padding: 14px 20px;
            font-size: 1.2rem;
            background: #15122b;
            border: 2px solid #6366f1;
            border-radius: 50px;
            color: white;
            width: 200px;
            text-align: center;
        }
        .guess-btn {
            background: #7c3aed;
            border: none;
            padding: 0 35px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .used-letters {
            text-align: center;
            margin: 15px 0;
            font-size: 1.1rem;
            color: #b9a9f0;
        }
        .feedback {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a274b;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            color: #ddd6fe;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .home-link:hover {
            background: #5b21b6;
        }
        .summary {
            background: #03000fcc;
            border-radius: 2rem;
            padding: 30px;
        }
        .mistake-item {
            background: #1a1635;
            margin: 12px 0;
            padding: 15px;
            border-left: 6px solid #ef4444;
            border-radius: 14px;
        }
        button {
            cursor: pointer;
        }
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-8px);}
            75%{ transform: translateX(8px);}
        }
        .shake-effect {
            animation: shake 0.3s ease;
        }
        .glow-green {
            text-shadow: 0 0 8px #10b981;
            transition: 0.1s;
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
    <!-- START SCREEN -->
    <div id="startScreen" class="screen">
        <div class="start-container">
            <h1>☠️ HANGMAN VOCAB ☠️</h1>
            <div class="mode-toggle">
                <div id="mode1p" class="mode-btn active">🎮 1 Player</div>
                <div id="mode2p" class="mode-btn">👥 2 Players</div>
            </div>
            <input type="text" id="p1Name" class="name-field" placeholder="Player 1 name" autocomplete="off">
            <input type="text" id="p2Name" class="name-field" placeholder="Player 2 name (for 2P mode)" autocomplete="off">
            <button id="launchGameBtn" class="start-btn">🔮 START NIGHTMARE 🔮</button>
            <!-- Home link (back to lesson) -->
            <div style="margin-top: 25px;">
                <a href="#" id="homeStartLink" class="home-link">⬅ Back to Lessons</a>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen hidden">
        <div class="game-header">
            <div class="turn-indicator" id="turnText">⚡ YOUR TURN</div>
            <div class="progress-area">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div id="questionCounter" class="badge" style="margin-top: 6px;">0 / 0</div>
            </div>
            <a href="#" id="gameHomeLink" class="home-link">⬅ Home</a>
        </div>
        <!-- dynamic hangman (1 or 2 players) -->
        <div id="hangmanContainer"></div>
        <!-- question block -->
        <div class="quiz-area">
            <div class="sentence" id="sentenceDisplay">Loading...</div>
            <div class="word-blanks" id="wordBlanks">_________</div>
            <div class="guess-area">
                <input type="text" id="guessInput" class="letter-input" maxlength="30" placeholder="Letter or word..." autocomplete="off">
                <button id="guessBtn" class="guess-btn">🔮 GUESS</button>
            </div>
            <div class="used-letters" id="usedLetters">✖️ Guessed: </div>
            <div class="feedback" id="feedbackMsg"></div>
        </div>
    </div>

    <!-- SUMMARY SCREEN -->
    <div id="summaryScreen" class="screen hidden">
        <div class="summary">
            <h2 style="text-align:center; margin-bottom:20px;">🏁 GAME OVER 🏁</h2>
            <div id="summaryStats"></div>
            <div id="wrongList"></div>
            <div style="text-align:center; margin-top:25px;">
                <a href="#" id="summaryHomeLink" class="home-link">⬅ Back to Lessons</a>
                <button id="restartBtn" style="margin-left:15px; background:#4f46e5; border:none; padding:8px 24px; border-radius:40px;">🔄 Play Again</button>
            </div>
        </div>
    </div>
</div>

<script>
    // -------------------- GLOBALS ---------------------
    let currentLessonId = null;
    let questionsList = [];         // [{word, meaning, sentence}]
    let currentQIndex = 0;
    let gameMode = "1P";           // "1P" or "2P"
    let players = [];
    let currentPlayerIdx = 0;
    let gameActive = true;
    let currentWord = "";           // answer of current question
    let displayWordArray = [];      // revealed letters
    let guessedLettersSet = new Set();
    let wrongAnswersLog = [];        // {sentence, correct, meaning, player}
    let backgroundMusic = null;
    let soundCorrect = null, soundWrong = null;

    // DOM elements
    const startDiv = document.getElementById('startScreen');
    const gameDiv = document.getElementById('gameScreen');
    const summaryDiv = document.getElementById('summaryScreen');
    const p1Input = document.getElementById('p1Name');
    const p2Input = document.getElementById('p2Name');
    const mode1p = document.getElementById('mode1p');
    const mode2p = document.getElementById('mode2p');
    const launchBtn = document.getElementById('launchGameBtn');
    const guessInput = document.getElementById('guessInput');
    const guessBtn = document.getElementById('guessBtn');
    const sentenceSpan = document.getElementById('sentenceDisplay');
    const wordBlanksSpan = document.getElementById('wordBlanks');
    const usedLettersSpan = document.getElementById('usedLetters');
    const feedbackSpan = document.getElementById('feedbackMsg');
    const progressFill = document.getElementById('progressFill');
    const questionCounter = document.getElementById('questionCounter');
    const turnText = document.getElementById('turnText');
    const hangmanContainer = document.getElementById('hangmanContainer');

    // Helper get URL param
    function getUrlParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // Home link dynamic href building
    function updateHomeLinks() {
        const id = currentLessonId || 'unit-10-grade-10';
        const homeHref = `../lesson3.html?id=${id}`;
        document.querySelectorAll('#homeStartLink, #gameHomeLink, #summaryHomeLink').forEach(link => {
            link.setAttribute('href', homeHref);
        });
    }

   // ---------- LOAD DATA FROM JSON ----------
async function loadGameData() {
    try {
        // 👉 ra khỏi /games/
        const articlesRes = await fetch('../data/articles.json');
        if (!articlesRes.ok) throw new Error('Cannot fetch articles.json');

        const articles = await articlesRes.json();

        // 👉 lấy id từ URL
        const params = new URLSearchParams(window.location.search);
        const lessonId = params.get("id");

        if (!lessonId) throw new Error("Missing lesson id");

        // 👉 tìm đúng bài
        const lessonMeta = articles.find(art => art.id === lessonId);
        if (!lessonMeta) throw new Error('Lesson not found');

        const dataFile = lessonMeta.dataFile;

        // 👉 load vocab
        const vocabRes = await fetch(`../data/${dataFile}`);
        if (!vocabRes.ok) throw new Error('Vocab file missing');

        const vocabData = await vocabRes.json();

        questionsList = vocabData.map(item => ({
            word: item.word,
            meaning: item.meaning || "no meaning",
            sentence: item.sentence.replace(/_{3,}/g, '________')
        }));

    } catch (err) {
        console.warn(err);
    }
}

    // ---------- HANGMAN PARTS ORDER (left leg, right leg, left arm, right arm, body, head) ----------
    const partOrder = ['left-leg', 'right-leg', 'left-arm', 'right-arm', 'body', 'head'];

    // render hangman for each player (update according to wrong guesses count)
    function renderPlayerHangman(player, containerElement) {
        if (!containerElement) return;
        containerElement.innerHTML = `
            <div class="gallows">
                <div class="pole vertical-pole" style="position:absolute;"></div>
                <div class="pole horizontal-beam" style="position:absolute;"></div>
                <div class="noose-rope" style="position:absolute;"></div>
                <div class="part head"></div>
                <div class="part body"></div>
                <div class="part left-arm"></div>
                <div class="part right-arm"></div>
                <div class="part left-leg"></div>
                <div class="part right-leg"></div>
            </div>
        `;
        const wrongCount = player.wrongCount;
        for (let i = 0; i < wrongCount && i < partOrder.length; i++) {
            const partClass = partOrder[i];
            const partEl = containerElement.querySelector(`.${partClass}`);
            if (partEl) partEl.style.opacity = '1';
        }
    }

    // update both players' visuals after wrong/lives changed
    function updateAllHangmans() {
        if (gameMode === '1P') {
            const container = document.querySelector('#player0 .hangman-figure');
            if (container) renderPlayerHangman(players[0], container);
        } else {
            players.forEach((p, idx) => {
                const container = document.querySelector(`#player${idx} .hangman-figure`);
                if (container) renderPlayerHangman(p, container);
            });
        }
    }

    // rebuild hangman container and player cards
    function buildHangmanUI() {
        if (gameMode === '1P') {
            hangmanContainer.innerHTML = `
                <div class="player-card" id="player0" style="max-width: 300px; margin: 0 auto;">
                    <div class="player-name">${players[0].name}</div>
                    <div class="lives">❤️ ${players[0].lives}</div>
                    <div class="hangman-figure"></div>
                </div>
            `;
            const fig = document.querySelector('#player0 .hangman-figure');
            renderPlayerHangman(players[0], fig);
        } else {
            let html = `<div class="dual-hangman">`;
            players.forEach((p, idx) => {
                const activeClass = (currentPlayerIdx === idx && gameActive) ? 'active-turn' : '';
                html += `
                    <div class="player-card ${activeClass}" id="player${idx}">
                        <div class="player-name">${p.name}</div>
                        <div class="lives">❤️ ${p.lives}</div>
                        <div class="hangman-figure"></div>
                        <div style="font-size:0.8rem; text-align:center;">Score: ${p.score}</div>
                    </div>
                `;
            });
            html += `</div>`;
            hangmanContainer.innerHTML = html;
            players.forEach((_, idx) => {
                const fig = document.querySelector(`#player${idx} .hangman-figure`);
                if (fig) renderPlayerHangman(players[idx], fig);
            });
        }
    }

    // update turn highlight & text
    function updateTurnUI() {
        if (gameMode === '2P') {
            turnText.innerText = `🎭 ${players[currentPlayerIdx].name}'s turn`;
            document.querySelectorAll('.player-card').forEach((card, idx) => {
                if (idx === currentPlayerIdx && gameActive) card.classList.add('active-turn');
                else card.classList.remove('active-turn');
            });
        } else {
            turnText.innerText = `👤 ${players[0].name} · HANGMAN`;
        }
    }

    // reset current question state
    function initQuestionRound() {
        if (!questionsList.length || currentQIndex >= questionsList.length) return false;
        const q = questionsList[currentQIndex];
        currentWord = q.word.toLowerCase();
        displayWordArray = Array(currentWord.length).fill('_');
        guessedLettersSet.clear();
        updateWordDisplay();
        sentenceSpan.innerText = q.sentence;
        usedLettersSpan.innerText = '✖️ Guessed: ';
        feedbackSpan.innerHTML = '';
        guessInput.value = '';
        guessInput.disabled = false;
        guessBtn.disabled = false;
        return true;
    }

    function updateWordDisplay() {
        wordBlanksSpan.innerText = displayWordArray.join(' ').toUpperCase();
    }

    function updateUsedLetters() {
        let letters = Array.from(guessedLettersSet).sort().join(', ');
        usedLettersSpan.innerText = '✖️ Guessed: ' + (letters || '—');
    }

    // check if word fully revealed
    function isWordRevealed() {
        return !displayWordArray.includes('_');
    }

    // process correct full reveal
    async function handleCorrectGuess(playerIdx) {
        // add score to player
        players[playerIdx].score++;
        // update scores on UI
        if (gameMode === '2P') {
            const scoreSpan = document.querySelector(`#player${playerIdx} .player-card div:last-child`);
            if (scoreSpan) scoreSpan.innerText = `Score: ${players[playerIdx].score}`;
        }
        feedbackSpan.innerHTML = '✅ CORRECT! +1 point!';
        feedbackSpan.style.color = '#4ade80';
        // move to next question
        currentQIndex++;
        if (currentQIndex >= questionsList.length) {
            endGameBecauseComplete();
            return;
        }
        updateProgress();
        initQuestionRound();
        // In 2P mode, correct guess keeps same player
        if (gameMode === '2P') {
            // same player continues
            updateTurnUI();
        }
        // clear green flash
    }

    // Wrong guess processing
    function handleWrongGuess(playerIdx) {
        const player = players[playerIdx];
        player.lives--;
        player.wrongCount++;
        // push to wrongAnswers log (store for summary)
        const q = questionsList[currentQIndex];
        wrongAnswersLog.push({
            sentence: q.sentence,
            correctWord: q.word,
            meaning: q.meaning,
            player: player.name,
            guessed: guessInput.value.trim()
        });
        // update hangman visual
        updateAllHangmans();
        // update lives display
        if (gameMode === '1P') {
            const livesSpan = document.querySelector('#player0 .lives');
            if (livesSpan) livesSpan.innerText = `❤️ ${player.lives}`;
        } else {
            const livesSpan = document.querySelector(`#player${playerIdx} .lives`);
            if (livesSpan) livesSpan.innerText = `❤️ ${player.lives}`;
        }

        // Shake + red flash
        const quizDiv = document.querySelector('.quiz-area');
        quizDiv.classList.add('shake-effect');
        setTimeout(() => quizDiv.classList.remove('shake-effect'), 300);
        feedbackSpan.innerHTML = `❌ WRONG! "${currentWord}" was correct.`;
        feedbackSpan.style.color = '#f97316';

        if (player.lives <= 0) {
            endGameBecauseDeath(player);
            return;
        }
        // In 2P mode switch turn
        if (gameMode === '2P') {
            currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
            // skip dead players? all players alive until end, but if lives=0 game already ended above.
            updateTurnUI();
            buildHangmanUI(); // refresh highlight
            updateTurnUI();
        }
        // reset input / allow re-guess
        guessInput.value = '';
        guessInput.disabled = false;
        guessBtn.disabled = false;
        updateUsedLetters();
    }

    // guess logic (letter or full word)
    async function processGuess() {
        if (!gameActive) return;
        let rawGuess = guessInput.value.trim().toLowerCase();
        if (rawGuess === "") {
            feedbackSpan.innerHTML = "⚠️ Enter a letter or word!";
            return;
        }
        const currentPlayer = players[gameMode === '2P' ? currentPlayerIdx : 0];
        if (currentPlayer.lives <= 0) return;
        const fullWordGuess = rawGuess === currentWord;
        let isCorrect = false;
        let letterCorrect = false;

        if (fullWordGuess) {
            // full word correct
            for (let i = 0; i < currentWord.length; i++) displayWordArray[i] = currentWord[i];
            updateWordDisplay();
            isCorrect = true;
        } else if (rawGuess.length === 1 && /[a-z]/i.test(rawGuess)) {
            const letter = rawGuess;
            if (guessedLettersSet.has(letter)) {
                feedbackSpan.innerHTML = "⚠️ Already guessed that letter!";
                return;
            }
            guessedLettersSet.add(letter);
            updateUsedLetters();
            if (currentWord.includes(letter)) {
                letterCorrect = true;
                for (let i = 0; i < currentWord.length; i++) {
                    if (currentWord[i] === letter) displayWordArray[i] = letter;
                }
                updateWordDisplay();
                if (isWordRevealed()) isCorrect = true;
            } else {
                letterCorrect = false;
            }
        } else {
            feedbackSpan.innerHTML = "🚫 Invalid guess (single letter or full word)";
            return;
        }

        if (isCorrect || letterCorrect) {
            // correct guess
            if (isWordRevealed() || fullWordGuess) {
                await handleCorrectGuess(gameMode === '2P' ? currentPlayerIdx : 0);
            } else {
                // partial letter correct but not fully solved -> nothing else
                feedbackSpan.innerHTML = "✨ Good letter! Keep going.";
                feedbackSpan.style.color = '#86efac';
                guessInput.value = '';
                guessInput.focus();
            }
        } else {
            // wrong guess
            handleWrongGuess(gameMode === '2P' ? currentPlayerIdx : 0);
        }
        if (!gameActive) return;
        guessInput.value = '';
        guessInput.focus();
    }

    function updateProgress() {
        const total = questionsList.length;
        const percent = ((currentQIndex) / total) * 100;
        progressFill.style.width = `${percent}%`;
        questionCounter.innerText = `${currentQIndex} / ${total}`;
    }

    function endGameBecauseDeath(player) {
        gameActive = false;
        showSummary(`💀 ${player.name} has been hanged! 💀`);
    }

    function endGameBecauseComplete() {
        gameActive = false;
        showSummary(`🏆 VICTORY! All words saved! 🏆`);
    }

    function showSummary(titleMsg) {
        stopMusic();
        gameDiv.classList.add('hidden');
        summaryDiv.classList.remove('hidden');
        let statsHtml = `<div style="text-align:center; font-size:1.5rem;">${titleMsg}</div>`;
        statsHtml += `<div class="result-stats" style="display:flex; justify-content:center; gap:20px; margin:20px 0;">`;
        players.forEach(p => {
            statsHtml += `<div class="stat-box" style="background:#1e1b2e; padding:12px 20px; border-radius:20px;"><span style="font-weight:bold;">${p.name}</span><br>✅ ${p.score} correct</div>`;
        });
        statsHtml += `</div>`;
        document.getElementById('summaryStats').innerHTML = statsHtml;
        let wrongHtml = `<h3>📜 Wrong Answers Log:</h3>`;
        if (wrongAnswersLog.length === 0) wrongHtml += `<p>✨ Perfect! No mistakes.</p>`;
        else {
            wrongAnswersLog.forEach(log => {
                wrongHtml += `<div class="mistake-item">
                    <div>🎭 ${log.player}</div>
                    <div>📖 "${log.sentence}"</div>
                    <div>🔑 Correct: <strong>${log.correctWord}</strong> — 🇻🇳 ${log.meaning}</div>
                </div>`;
            });
        }
        document.getElementById('wrongList').innerHTML = wrongHtml;
    }

    // background music + optional
    function initAudio() {
        backgroundMusic = new Audio('https://github.com/ms-thuy-classes/audio/raw/refs/heads/main/simplesound-horror-trailer-443327.mp3');
        backgroundMusic.loop = true;
        backgroundMusic.volume = 0.3;
        soundCorrect = new Audio();
        soundWrong = new Audio();
        // no external sfx optional
    }
    function playMusic() {
        if (backgroundMusic) backgroundMusic.play().catch(e=>console.log("autoplay blocked"));
    }
    function stopMusic() {
        if (backgroundMusic) { backgroundMusic.pause(); backgroundMusic.currentTime = 0; }
    }

    // start full game flow
    async function startGame() {
        const mode = gameMode;
        let p1 = p1Input.value.trim() || "Shadow";
        let p2 = p2Input.value.trim() || "Specter";
        if (mode === '1P') players = [{ name: p1, lives: 6, wrongCount: 0, score: 0 }];
        else players = [{ name: p1, lives: 6, wrongCount: 0, score: 0 }, { name: p2, lives: 6, wrongCount: 0, score: 0 }];
        currentPlayerIdx = 0;
        currentQIndex = 0;
        wrongAnswersLog = [];
        gameActive = true;
        await loadGameData();
        if (!questionsList.length) { alert("No vocab data found"); return; }
        initQuestionRound();
        updateProgress();
        buildHangmanUI();
        updateTurnUI();
        startDiv.classList.add('hidden');
        gameDiv.classList.remove('hidden');
        summaryDiv.classList.add('hidden');
        playMusic();
        guessInput.focus();
    }

    // EVENT HANDLERS
    function switchMode(mode) {
        gameMode = mode;
        if (mode === '1P') { mode1p.classList.add('active'); mode2p.classList.remove('active'); p2Input.style.opacity = '0.6'; p2Input.disabled = true; }
        else { mode2p.classList.add('active'); mode1p.classList.remove('active'); p2Input.disabled = false; p2Input.style.opacity = '1'; }
    }

    mode1p.onclick = () => switchMode('1P');
    mode2p.onclick = () => switchMode('2P');
    launchBtn.onclick = async () => { currentLessonId = getUrlParam('id') || 'unit-10-grade-10'; updateHomeLinks(); await startGame(); };
    guessBtn.onclick = () => processGuess();
    document.getElementById('restartBtn')?.addEventListener('click', () => location.reload());
    document.getElementById('guessInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') processGuess(); });

    function init() {
        switchMode('1P');
        p2Input.disabled = true;
        initAudio();
        updateHomeLinks();
    }
    init();
</script>
</body>
</html>
